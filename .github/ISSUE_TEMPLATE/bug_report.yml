name: "🐞 Bug report"
description: Report a reproducible problem in Aegis MemoryAgent
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing a bug. **Do not report security vulnerabilities here** — use a
        [private security advisory](../../security/advisories/new) instead (see `SECURITY.md`).
        Please don't paste API keys, secrets, or personal data from your memory store.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug and what you expected instead.
      placeholder: "Recall returned X, I expected Y…"
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Run `python -m memoryagent.cli`
        2. Enter '...'
        3. See error
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs / traceback
      description: Paste relevant output. Redact keys and personal data first.
      render: shell
  - type: input
    id: version
    attributes:
      label: Version / commit
      placeholder: "e.g. main @ d8c640d"
    validations:
      required: true
  - type: dropdown
    id: backend
    attributes:
      label: AI backend
      options:
        - "Qwen Cloud (default)"
        - "Other OpenAI-compatible endpoint"
        - "Local model"
    validations:
      required: true
  - type: input
    id: env
    attributes:
      label: OS / Python version
      placeholder: "Windows 11 / Python 3.12"
    validations:
      required: true
